# Shorts Automation Pipeline - 공통 + 환경별 설정
common:
  PROJECT_ROOT: "/home/ubuntu/brain50"

dev:
  BASE_DIR: "${PROJECT_ROOT}/dev"
  SRC_DIR: "${BASE_DIR}/src"
  ASSETS_DIR: "${BASE_DIR}/data/assets"
  WORK_DIR_BASE: "${BASE_DIR}/data/work"
  OUTPUT_DIR: "${BASE_DIR}/data/output"
  BACKUP_DIR: "${BASE_DIR}/data/backups"
  CLAUDE_MODEL: "claude-sonnet-4-6"
  MAX_TOKENS: 4000
  LOG_LEVEL: "DEBUG"
  ATEMPO: 1.3
  TARGET_DURATION_SEC: 90
  CHARS_PER_SEC: 4.66
  CAPTION_FONT_SIZE: 22
  CAPTION_MARGIN_V: 60

prod:
  BASE_DIR: "${PROJECT_ROOT}/prod"
  SRC_DIR: "${BASE_DIR}/src"
  ASSETS_DIR: "${BASE_DIR}/data/assets"
  WORK_DIR_BASE: "${BASE_DIR}/data/work"
  OUTPUT_DIR: "${BASE_DIR}/data/output"
  BACKUP_DIR: "${BASE_DIR}/data/backups"
  CLAUDE_MODEL: "claude-sonnet-4-6"
  MAX_TOKENS: 4000
  LOG_LEVEL: "INFO"
  ATEMPO: 1.15
  TARGET_DURATION_SEC: 60
  CHARS_PER_SEC: 4.66
  CAPTION_FONT_SIZE: 22
  CAPTION_MARGIN_V: 55
